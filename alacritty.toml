[terminal.shell]
program = "wsl"

[env]
TERM = "xterm-256color"


[general]
working_directory = "C:\\Users\\maxim"
live_config_reload = true

import = [
    # "themes/themes/citylights.toml"
    "themes/themes/iris.toml"
    # "themes/themes/cyber_punk_neon.toml"
]

[window]
dimensions = { columns = 150, lines = 30 }
opacity = 0.90
decorations_theme_variant = "Dark"

[font]
size = 13.0
normal = {family = "JetBrainsMono Nerd Font", style = "Regular"}

[colors]


[selection]
save_to_clipboard = true

[cursor]
style = { shape = "Block", blinking = "On" }

[[keyboard.bindings]]
key = "T"
mods = "Control|Shift"
action = "SpawnNewInstance"
